# The local path where the RepliStore filesystem will be mounted.
mount_point: "/tmp/replistore/mount"

# Replication settings
replication:
  # The number of backend replicas to write for each file.
  factor: 2
  # The number of successful backend writes required to acknowledge a write.
  # Defaults to replication.factor if not specified.
  write_quorum: 1

# The maximum write/IO duration budget
max_io_duration: "1s"

# Metadata cache settings
cache:
  # How often to scan backends to sync the in-memory metadata cache.
  refresh_interval: "5m"
  # The local directory where state files (like the serialized cache) are stored.
  state_dir: "/tmp/replistore/state"

# Background repair settings
repair:
  # How often to search for and re-replicate degraded files.
  interval: "1h"
  # How long a file must stay under/over-replicated before repair acts on it,
  # so a brief backend reboot does not cause replication churn. Should be
  # >= repair_interval (a shorter grace is raised to it). 0 acts at once.
  grace: "1h"
  # The maximum number of concurrent repair operations.
  concurrency: 2

# Optional: P2P clustering configuration for distributed locking.
# When listen_addr is set, the other fields become mandatory.
# cluster:
#   listen_addr: ":5050"                  # UDP port for the lock server
#   advertise_addr: "192.168.1.50:5050"   # host:port peers use to reach this node
#   secret: "change-me-16chars+"          # shared HMAC secret, same on all nodes (min 16 chars)
#   expected_cluster_size: 2              # total nodes in the cluster (quorum = n/2+1)

# HTTP Control & Observability API Configuration
# api:
#   addr: ":8080"
#   api_token: "api-secret-token"
#   metrics_token: "metrics-secret-token"

backends:
  - name: "nas-01"
    address: "127.0.0.1:445"           # Host and port of the SMB server
    share: "share1"                   # SMB share name
    user: "user"                       # SMB username
    password: "password"               # SMB password
    speed: 10                          # Read speed rating (default 10)
    tags: ["hot"]                      # Custom tags (default empty list)
  - name: "nas-02"
    address: "127.0.0.1:445"           # Host and port of the SMB server
    share: "share2"                   # SMB share name
    user: "user"                       # SMB username
    password: "password"               # SMB password
    speed: 5                           # Slower read speed
    tags: ["cold-storage"]             # Match write_affinity to ensure backups here
  - name: "local-ssd"
    type: "local"
    path: "/tmp/test-storage"
    speed: 50