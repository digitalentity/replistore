version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  disable:
    - errcheck
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF1001"
        - "-ST1000"
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: blank-imports
          disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
